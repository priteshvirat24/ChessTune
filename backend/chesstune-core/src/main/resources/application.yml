# ═══════════════════════════════════════════════
# ChessTune Core — Application Configuration
# REST API on port 8080
# ═══════════════════════════════════════════════

server:
  port: 8080

spring:
  application:
    name: chesstune-core

  # ─── PostgreSQL ──────────────────────────────
  datasource:
    url: jdbc:postgresql://${CHESSTUNE_DB_HOST:localhost}:${CHESSTUNE_DB_PORT:5432}/${CHESSTUNE_DB_NAME:chesstune}
    username: ${CHESSTUNE_DB_USER:chesstune}
    password: ${CHESSTUNE_DB_PASSWORD:chesstune_dev_2024}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── Redis ───────────────────────────────────
  data:
    redis:
      host: ${CHESSTUNE_REDIS_HOST:localhost}
      port: ${CHESSTUNE_REDIS_PORT:6379}

  # ─── RabbitMQ ────────────────────────────────
  rabbitmq:
    host: ${CHESSTUNE_RABBITMQ_HOST:localhost}
    port: ${CHESSTUNE_RABBITMQ_PORT:5672}
    username: ${CHESSTUNE_RABBITMQ_USER:chesstune}
    password: ${CHESSTUNE_RABBITMQ_PASSWORD:chesstune_mq_dev}

# ─── JWT Configuration ──────────────────────────
chesstune:
  jwt:
    secret: ${CHESSTUNE_JWT_SECRET:chesstune-dev-secret-key-change-in-production-minimum-256-bits-long}
    expiration-ms: ${CHESSTUNE_JWT_EXPIRATION_MS:86400000}

# ─── Logging ─────────────────────────────────────
logging:
  level:
    com.chesstune: DEBUG
    org.springframework.security: DEBUG
